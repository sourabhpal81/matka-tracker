name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Copy web UI into app assets
        run: |
          mkdir -p android/app/src/main/assets
          cp app_ui/index.html android/app/src/main/assets/index.html
          cp app_ui/feed.js    android/app/src/main/assets/feed.js
          cp app_ui/config.js  android/app/src/main/assets/config.js
          ls -la android/app/src/main/assets

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk matka-tracker.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: matka-tracker-apk
          path: matka-tracker.apk

      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-latest
          name: Matka Tracker (latest build)
          body: Latest Matka Tracker APK. Download matka-tracker.apk below and install on your Android device.
          files: matka-tracker.apk
