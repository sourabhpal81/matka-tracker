name: Update feed (scrape + publish)

# Runs twice a day on GitHub's servers: scrapes the latest results, rebuilds
# feed.json, and commits it back. Every installed app then pulls the fresh feed
# on next open — no PC, no reinstall, fully automatic.
#
# You can also run it on demand from the Actions tab (Run workflow).

on:
  schedule:
    # A few times a day at result windows (gentler than every 30 min, which the
    # source tends to block). Cron is UTC; IST = UTC+5:30.
    #  05:30->11:00, 11:30->17:00, 15:30->21:00, 18:30->00:00, 19:30->01:00 IST
    - cron: '30 5,11,15,18,19 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-feed
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape latest results into matka.db
        run: python auto_update.py --days 12 --quiet || true

      - name: Publish ONLY if new data was actually fetched
        run: |
          # If matka.db is unchanged, the source was blocked/empty — do nothing,
          # so we never overwrite the good feed published from the PC.
          if git diff --quiet -- matka.db; then
            echo "No new results fetched (source unreachable or nothing new). Skipping."
            exit 0
          fi
          python export_feed.py --out app_ui/feed.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add matka.db app_ui/feed.json app_ui/feed.js
          git commit -m "Cloud auto update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
